version: 2

models:
  - name: dim_date
    description: Calendar dimension from 2024-01-01 through 2049-12-31.

    columns:
      - name: date_key
        description: Integer date key in YYYYMMDD format.
        tests:
          - unique
          - not_null

      - name: full_date
        description: Actual calendar date.
        tests:
          - unique
          - not_null