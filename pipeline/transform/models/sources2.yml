version: 2

sources:
  - name: firefly
    description: "Firefly III operational database"

    database: "{{ env_var('DB_SOURCE_DATABASE') }}"
    schema: public

    tables:

      - name: users
        description: "Application users"

      - name: user_groups
        description: "User groups"

      - name: accounts
        description: "Financial accounts"

      - name: account_types
        description: "Account type definitions"

      - name: account_balances
        description: "Historical account balances"

      - name: transaction_journals
        description: "Transaction journal headers"

      - name: transactions
        description: "Transaction line items"

      - name: transaction_types
        description: "Deposit, withdrawal, transfer, etc."

      - name: transaction_currencies
        description: "Supported currencies"

      - name: currency_exchange_rates
        description: "Currency exchange rates"

      - name: categories
        description: "Transaction categories"

      - name: category_transaction
        description: "Category to transaction mapping"

      - name: tags
        description: "User-defined transaction tags"

      - name: tag_transaction_journal
        description: "Tag to transaction journal mapping"

      - name: budgets
        description: "User budgets"

      - name: budget_transaction
        description: "Budget to transaction mapping"

      - name: budget_limits
        description: "Budget limits"

      - name: piggy_banks
        description: "Savings goals"

      - name: bills
        description: "Recurring bills"

      - name: recurrences
        description: "Recurring transaction definitions"